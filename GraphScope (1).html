<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphScope · 计算图渲染 / 对比</title>
<style>
  :root{
    --bg:#eef0f4; --grid-dot:rgba(120,128,144,.34);
    --ink:#1f2733; --ink2:#5b6472; --ink3:#98a2b3; --val:#101828;
    --line:#e4e6ec; --line2:#eceef2;
    --panel:#ffffff; --panel2:#fafbfc;
    --card:#ffffff; --card-bd:#e4e6ec; --card-hd:#f6f7f9;
    --op:#e9ebf9; --op-bd:#d3d8f0; --op-tab:#dde1f3; --op-div:#cfd5ee; --op-ink:#343b59; --op-id:#5a6178;
    --port:#fff; --port-bd:#c2c7d2;
    --edge:#c2c7d2; --edge-hi:#8b93a3;
    --accent:#3b82f6; --accent-soft:#dbeafe;
    --green:#22c55e; --green-soft:#dcfce7; --green-bd:#86efac;
    --d-add:#16a34a; --d-add-bg:#e9f8ee;
    --d-rem:#e11d48; --d-rem-bg:#fdeaee;
    --d-mod:#d97706; --d-mod-bg:#fdf3e3;
    --shadow:0 1px 2px rgba(16,24,40,.05), 0 4px 14px rgba(16,24,40,.07);
    --shadow-lg:0 2px 6px rgba(16,24,40,.10), 0 12px 28px rgba(16,24,40,.12);
    --mono:'SF Mono','JetBrains Mono','Roboto Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:ui-sans-serif,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
  #app{display:flex;flex-direction:column;height:100vh}

  header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(255,255,255,.86);
    backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);z-index:30;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.2px;margin-right:4px}
  .brand .glyph{width:22px;height:22px;color:var(--accent)}
  .brand small{font-weight:500;color:var(--ink3);font-size:11px;letter-spacing:.3px}
  .sep{width:1px;height:22px;background:var(--line);margin:0 2px}
  .seg{display:inline-flex;background:#f0f1f5;border:1px solid var(--line);border-radius:9px;padding:2px}
  .seg button{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--ink2);
    font:600 12.5px/1 var(--sans);padding:7px 12px;border-radius:7px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(16,24,40,.12)}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);
    font:600 12.5px/1 var(--sans);padding:8px 12px;border-radius:9px;cursor:pointer;transition:.12s}
  .btn:hover{border-color:#cdd2db;box-shadow:0 1px 3px rgba(16,24,40,.08)}
  .btn:active{transform:translateY(1px)}
  .btn svg{width:15px;height:15px;opacity:.8}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#2f74ec}
  .btn.ghost{background:transparent}
  .btn[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}
  .search{position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:9px;width:14px;height:14px;color:var(--ink3)}
  .search input{border:1px solid var(--line);border-radius:9px;padding:8px 10px 8px 28px;font:500 12.5px var(--sans);
    background:#fff;width:170px;color:var(--ink)}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  select.ctl{border:1px solid var(--line);border-radius:9px;padding:8px 9px;font:600 12px var(--sans);background:#fff;color:var(--ink);cursor:pointer}
  .spacer{flex:1}
  .tag{font:600 11px/1 var(--mono);color:var(--ink2);background:#f0f1f5;border:1px solid var(--line);padding:5px 8px;border-radius:7px}

  #stage{position:relative;flex:1;overflow:hidden}
  #canvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;display:block;touch-action:none}
  #canvas.grabbing{cursor:grabbing}
  .node{cursor:pointer}
  .node *{ -webkit-user-select:none; user-select:none }
  text{ dominant-baseline:middle }

  #rail{position:absolute;top:12px;right:12px;bottom:12px;width:312px;display:flex;flex-direction:column;gap:10px;
    z-index:20;pointer-events:none}
  .card-ui{background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);pointer-events:auto;overflow:hidden}
  .card-ui .hd{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid var(--line2);
    font-weight:700;font-size:12.5px;letter-spacing:.2px}
  .card-ui .hd .dot{width:8px;height:8px;border-radius:50%}
  .card-ui .bd{padding:11px 13px;font-size:12.5px;color:var(--ink2);overflow:auto}
  #railScroll{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;overflow:auto;padding-right:2px}

  .kv{display:grid;grid-template-columns:84px 1fr;gap:4px 10px;align-items:baseline}
  .kv .k{color:var(--ink3);font-size:11.5px}
  .kv .v{color:var(--val);font-family:var(--mono);font-size:12px;word-break:break-word}
  .pill-ty{display:inline-flex;align-items:center;gap:5px;font:600 10.5px/1 var(--mono);padding:4px 8px;border-radius:999px}
  .empty{color:var(--ink3);font-size:12px;padding:6px 2px}

  .barrow{display:flex;align-items:center;gap:9px;margin:7px 0}
  .barrow .lbl{width:64px;font-size:11.5px;color:var(--ink2)}
  .barrow .track{flex:1;height:8px;background:#f0f1f5;border-radius:5px;overflow:hidden}
  .barrow .fill{height:100%;border-radius:5px}
  .barrow .num{width:30px;text-align:right;font:600 12px var(--mono);color:var(--ink)}
  .edgesum{margin-top:9px;padding-top:9px;border-top:1px solid var(--line2);font:600 11.5px var(--mono);color:var(--ink2)}

  .chgitem{display:flex;align-items:center;gap:8px;padding:6px 4px;border-radius:8px;cursor:pointer;font-size:12px}
  .chgitem:hover{background:#f5f6f8}
  .chgitem .sw{width:9px;height:9px;border-radius:3px;flex:none}
  .chgitem .nm{font-family:var(--mono);font-size:11.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .chgitem .ty{font-size:10px;color:var(--ink3)}

  .legend{display:flex;flex-direction:column;gap:7px}
  .legrow{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink2);cursor:pointer;border-radius:7px;padding:3px 4px}
  .legrow:hover{background:#f5f6f8}
  .legrow.off{opacity:.4}
  .legrow .sw{width:14px;height:14px;border-radius:5px;border:1px solid rgba(0,0,0,.06)}

  #scrub{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;z-index:25;width:min(680px,calc(100% - 360px));
    background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow-lg);padding:11px 14px;display:none}
  #scrub.show{display:block}
  .scrub-top{display:flex;align-items:center;gap:12px}
  .tbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--ink)}
  .tbtn:hover{border-color:#cdd2db}
  .tbtn svg{width:16px;height:16px}
  .tbtn.play{background:var(--accent);border-color:var(--accent);color:#fff;width:38px;height:38px}
  #range{flex:1;-webkit-appearance:none;height:6px;border-radius:4px;background:linear-gradient(90deg,var(--d-rem) 0,var(--accent) 50%,var(--d-add) 100%);outline:none}
  #range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  #range::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer}
  .scrub-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:11.5px;color:var(--ink2)}
  .phase{font-weight:600;font-family:var(--mono);font-size:11.5px}
  .scrub-meta label{display:inline-flex;align-items:center;gap:6px;cursor:pointer}

  #zoombox{position:absolute;left:12px;bottom:14px;z-index:20;display:flex;flex-direction:column;gap:6px}
  #zoombox .tbtn{width:32px;height:32px}
  #drop{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(238,240,244,.82);backdrop-filter:blur(3px)}
  #drop.show{display:flex}
  #drop .box{border:2px dashed var(--accent);border-radius:18px;padding:42px 60px;background:#fff;text-align:center;color:var(--ink);box-shadow:var(--shadow-lg)}
  #drop .box b{font-size:16px}#drop .box span{display:block;color:var(--ink2);font-size:12.5px;margin-top:6px}
  #toast{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:50;background:#1f2733;color:#fff;
    font-size:12.5px;padding:9px 15px;border-radius:10px;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow-lg)}
  #toast.show{opacity:1}
  .hint{position:absolute;left:12px;top:12px;z-index:15;font-size:11.5px;color:var(--ink3);background:rgba(255,255,255,.8);
    border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-family:var(--mono);max-width:300px;line-height:1.5}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#d3d7de;border-radius:8px;border:2px solid transparent;background-clip:content-box}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="5" cy="6" r="2.2"/><circle cx="5" cy="18" r="2.2"/><rect x="14.5" y="3.4" width="6.6" height="5.4" rx="1.4"/><rect x="14.5" y="14.6" width="6.6" height="5.4" rx="1.4"/>
        <path d="M7.2 6h3.3a2 2 0 0 1 2 2v0M7.2 18h3.3a2 2 0 0 0 2-2v0"/>
      </svg>
      GraphScope <small>计算图渲染 / 对比</small>
    </div>
    <div class="sep"></div>
    <div class="seg" id="modeSeg">
      <button data-mode="single" class="on">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="12" r="2.4"/><circle cx="6" cy="18" r="2.4"/><path d="M8 7l8 4M8 17l8-4"/></svg>
        单图
      </button>
      <button data-mode="compare">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="7" height="14" rx="1.5"/><rect x="14" y="5" width="7" height="14" rx="1.5"/></svg>
        对比
      </button>
    </div>
    <button class="btn" id="loadA"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg><span id="loadAlbl">载入基准图</span></button>
    <button class="btn" id="loadB" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg><span id="loadBlbl">载入对比图 (After)</span></button>
    <button class="btn ghost" id="demoBtn" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5z"/></svg>生成示例 After</button>
    <input type="file" id="fileA" accept=".json,application/json" hidden>
    <input type="file" id="fileB" accept=".json,application/json" hidden>
    <div class="spacer"></div>
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="search" placeholder="搜索算子 / 张量 / magic…"></div>
    <select class="ctl" id="colorMode" title="着色方式">
      <option value="struct">结构 (默认)</option>
      <option value="cat">算子类别</option>
      <option value="dtype">数据类型</option>
      <option value="lat">延迟热度</option>
    </select>
    <button class="btn" id="fitBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>适应</button>
  </header>

  <div id="stage">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="1.1" fill="var(--grid-dot)"/>
        </pattern>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
          <feDropShadow dx="0" dy="2" stdDeviation="3.2" flood-color="#101828" flood-opacity="0.10"/>
        </filter>
        <filter id="cardShadowLg" x="-30%" y="-30%" width="160%" height="170%">
          <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#101828" flood-opacity="0.16"/>
        </filter>
      </defs>
      <g id="viewport">
        <rect id="grid" x="-4000" y="-4000" width="40000" height="40000" fill="url(#dots)"/>
        <g id="edgeLayer"></g>
        <g id="nodeLayer"></g>
      </g>
    </svg>

    <div class="hint" id="hint">拖拽平移 · 滚轮缩放 · 点击节点查看详情 · F 适应视图</div>

    <aside id="rail">
      <div id="railScroll">
        <div class="card-ui" id="inspCard">
          <div class="hd"><span class="dot" style="background:var(--accent)"></span><span id="inspTitle">节点检查器</span></div>
          <div class="bd" id="inspBody"><div class="empty">点击任意算子或张量节点查看详情。</div></div>
        </div>
        <div class="card-ui" id="diffCard" style="display:none">
          <div class="hd"><span class="dot" style="background:var(--d-mod)"></span>差异概览</div>
          <div class="bd" id="diffStats"></div>
        </div>
        <div class="card-ui" id="diffListCard" style="display:none">
          <div class="hd"><span class="dot" style="background:var(--d-add)"></span>变化清单 <span id="chgCount" class="tag" style="margin-left:auto"></span></div>
          <div class="bd" id="diffList" style="max-height:230px"></div>
        </div>
        <div class="card-ui" id="legendCard">
          <div class="hd"><span class="dot" style="background:var(--ink3)"></span><span id="legTitle">图例</span></div>
          <div class="bd"><div class="legend" id="legend"></div></div>
        </div>
        <div class="card-ui">
          <div class="hd"><span class="dot" style="background:var(--green)"></span>计算图信息</div>
          <div class="bd" id="overview"></div>
        </div>
      </div>
    </aside>

    <div id="zoombox">
      <button class="tbtn" id="zoomIn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
      <button class="tbtn" id="zoomOut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg></button>
      <button class="tbtn" id="zoomReset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
    </div>

    <div id="scrub">
      <div class="scrub-top">
        <button class="tbtn" id="toStart" title="到 Before"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20L9 12l10-8zM5 4v16"/></svg></button>
        <button class="tbtn play" id="playBtn" title="播放/暂停"><svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="tbtn" id="toEnd" title="到 After"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4l10 8-10 8zM19 4v16"/></svg></button>
        <input type="range" id="range" min="0" max="1000" value="0">
      </div>
      <div class="scrub-meta">
        <span class="phase" id="phase">Before</span>
        <label><input type="checkbox" id="loopChk"> 循环播放</label>
      </div>
    </div>

    <div id="drop"><div class="box"><b>松开以载入计算图 JSON</b><span id="dropSub">将解析为基准图</span></div></div>
  </div>
  <div id="toast"></div>

  };

    MULS:'elementwise', MUL:'elementwise', ADD:'elementwise', SUB:'elementwise', MAXIMUM:'elementwise',

    var badge = String(n.magic == null ? '' : n.magic).length * 7 + 10;

    var rawByMagic = {}; raws.forEach(function(r){ rawByMagic[r.rawmagic] = r; });

      var n = {
        id: id, kind: 'tensor',
        magic: t.magic, rawmagic: t.rawtensor,
        symbol: r.symbol || '',

        nodetype: t.nodetype,                  // 0 internal, 1 incast(input), 2 outcast(output)
        boundary: (t.nodetype === 1 || t.nodetype === 2),
        datatype: r.datatype,
        shape: t.shape,

          ['rawshape', fmtList(r.rawshape)],
          ['offset', fmtList(t.offset)],

    });

      var n = {

        title: 'TILE_' + o.opcode,

        latency: o.latency,
        semantic: (o.semantic_label || []).join(', '),
        opAttr: o.op_attr || {},

        var t = tensorByMagic[m]; if (!t) return;
        var k = oid + '->' + t.id; if (seen[k]) return; seen[k] = 1;
        edges.push({ id: k, from: oid, to: t.id });
      });
    });

      label: label || '', nodes: nodes, edges: edges, byId: byId, rawJSON: json,
      counts: { ops: ops.length, tensors: tens.length, edges: edges.length,

    var pos={}; ranksArr.forEach(function(layer){ layer.forEach(function(id,i){ pos[id]=i; }); });

    }

    });

          var target = nb.length ? nb.reduce(function(a,b){return a+b;},0)/nb.length : Y[id];

<script>
// RemoveRedundantReshape demo: drop VIEW ops whose single input/output tensors have equal shape,
// rewire consumers of the output tensor to the input tensor, and remove the orphaned output tensor.
function synthAfter(beforeJson){
  const j=JSON.parse(JSON.stringify(beforeJson));
  const fn=j.functions[0];
  const tByMagic={}; fn.tensors.forEach(t=>tByMagic[t.magic]=t);
  const eq=(a,b)=>Array.isArray(a)&&Array.isArray(b)&&a.length===b.length&&a.every((x,i)=>x===b[i]);
  const remap={}; const removedTensors=new Set(); const removedOps=new Set();
  let budget=6; // collapse up to 6 redundant reshapes for a clear demo
  for(const op of fn.operations){
    if(budget<=0) break;
    if(op.opcode!=='VIEW') continue;
    if((op.ioperands||[]).length!==1||(op.ooperands||[]).length!==1) continue;
    const inM=op.ioperands[0], outM=op.ooperands[0];
    const ti=tByMagic[inM], to=tByMagic[outM];
    if(!ti||!to) continue;
    if(!eq(ti.shape,to.shape)) continue;        // only true no-op reshapes
    if(to.nodetype===2) continue;               // keep graph outputs
    // collapse: out -> in
    remap[outM]=inM; removedOps.add(op.opmagic); removedTensors.add(outM);
    budget--;
  }
  // resolve chained remaps
  const resolve=m=>{ let x=m; const seen=new Set(); while(remap[x]!=null&&!seen.has(x)){seen.add(x);x=remap[x];} return x; };
  fn.operations = fn.operations.filter(o=>!removedOps.has(o.opmagic));
  fn.operations.forEach(o=>{
    o.ioperands=(o.ioperands||[]).map(resolve);
    o.ooperands=(o.ooperands||[]).map(resolve);
  });
  fn.tensors = fn.tensors.filter(t=>!removedTensors.has(t.magic));
  return j;
}
window.synthAfter=synthAfter;

</script>

function updatePhase(){ var p=$('#phase'); var t=State.t; if(t<0.02)p.textContent='Before'; else if(t>0.98)p.textContent='After'; else p.textContent='过渡中 · '+Math.round(t*100)+'%'; }
function play(){ if(State.playing){stop();return;} if(State.t>=1)State.t=0; State.playing=true; setPlayIcon(true); var last=performance.now();
  function step(now){ if(!State.playing)return; var dt=(now-last)/1000; last=now; State.t+=dt/2.4; if(State.t>=1){ State.t=1; frame(); $('#range').value='1000'; updatePhase(); if(State.loop){State.t=0;}else{stop();return;} } setT(State.t,true); State.raf=requestAnimationFrame(step); }
  State.raf=requestAnimationFrame(step);
}
function stop(){ State.playing=false; setPlayIcon(false); if(State.raf)cancelAnimationFrame(State.raf); }
function setPlayIcon(playing){ $('#playIcon').innerHTML= playing? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>'; }

function renderInspector(id){
  var s=State.scene.byId[id]; var b=$('#inspBody'); var ttl=$('#inspTitle');
  if(!s){ b.innerHTML='<div class="empty">点击任意算子或张量节点查看详情。</div>'; ttl.textContent='节点检查器'; return; }
  var n=s.node;
  if(n.kind==='op'){
    ttl.textContent='算子 · '+n.opcode;
    var rows=[['opcode',n.opcode],['opmagic',n.opmagic],['类别',CAT_LABEL[n.category]||n.category],['latency',(n.latency!=null?n.latency:'—')],['semantic',n.semantic||'—'],['输入张量',n.ioperands.join(', ')||'—'],['输出张量',n.ooperands.join(', ')||'—']];
    var attrs=Object.keys(n.opAttr||{});
    var html='<div class="kv">';
    rows.forEach(function(r){ html+='<div class="k">'+esc(r[0])+'</div><div class="v">'+esc(r[1])+'</div>'; });
    html+='</div>';
    if(attrs.length){ html+='<div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--line2)"><div class="k" style="margin-bottom:5px">op_attr</div>'; attrs.forEach(function(a){ html+='<div class="v" style="font-size:11.5px">'+esc(a)+': '+esc(String(n.opAttr[a]))+'</div>'; }); html+='</div>'; }
    if(State.mode==='compare') html+=stateBadge(s.state);
    b.innerHTML=html;
  } else {
    ttl.textContent='张量 · '+(n.symbol||'Tensor');
    var nt=E.NODETYPE_NAME[n.nodetype]; var ntZh={internal:'内部',input:'图输入 (incast)',output:'图输出 (outcast)'}[nt]||nt;
    var html2='<div class="pill-ty" style="background:'+(n.boundary?'var(--green-soft)':'#eef0f4')+';color:'+(n.boundary?'#15803d':'var(--ink2)')+';margin-bottom:9px">'+esc(ntZh)+'</div>';
    var rows2=[['symbol',n.symbol||'(匿名)'],['magic',n.magic],['rawmagic',n.rawmagic]].concat(n.rows.map(function(r){return [r[0],r[1]];}));
    html2+='<div class="kv">'; rows2.forEach(function(r){ html2+='<div class="k">'+esc(r[0])+'</div><div class="v">'+esc(r[1])+'</div>'; }); html2+='</div>';
    if(State.mode==='compare') html2+=stateBadge(s.state);
    b.innerHTML=html2;
  }
}
function stateBadge(st){ var m={added:['新增','var(--d-add-bg)','#15803d'],removed:['删除','var(--d-rem-bg)','#be123c'],modified:['修改','var(--d-mod-bg)','#b45309'],same:['未变化','#eef0f4','var(--ink2)']}[st]||['—','#eef0f4','var(--ink2)'];
  return '<div class="pill-ty" style="background:'+m[1]+';color:'+m[2]+';margin-top:10px">差异状态：'+m[0]+'</div>'; }

function renderOverview(){
  var g=State.graphs.A; if(!g){$('#overview').innerHTML='';return;}
  var c=g.counts;
  var html='<div class="kv">'
    +'<div class="k">基准图</div><div class="v">'+esc(g.label||'—')+'</div>'
    +'<div class="k">算子节点</div><div class="v">'+c.ops+'</div>'
    +'<div class="k">张量节点</div><div class="v">'+c.tensors+'</div>'
    +'<div class="k">连边</div><div class="v">'+c.edges+'</div>'
    +'<div class="k">图输入</div><div class="v">'+c.inputs+'</div>'
    +'<div class="k">图输出</div><div class="v">'+c.outputs+'</div>';
  if(State.graphs.B){ html+='<div class="k">对比图</div><div class="v">'+esc(State.graphs.B.label||'—')+'</div>'; }
  html+='</div>';
  $('#overview').innerHTML=html;
}

function renderLegend(){
  var L=$('#legend'); var rows=[];
  if(State.mode==='compare'){
    $('#legTitle').textContent='差异图例';
    rows=[['added','新增','var(--d-add-bg)'],['removed','删除','var(--d-rem-bg)'],['modified','修改','var(--d-mod-bg)'],['same','未变化','#fff']];
    L.innerHTML=rows.map(function(r){return '<div class="legrow"><span class="sw" style="background:'+r[2]+';border-color:'+(STATE_COLOR[r[0]]||'#e4e6ec')+'"></span>'+r[1]+'</div>';}).join('');
    return;
  }
  if(State.colorMode==='cat'){ $('#legTitle').textContent='算子类别';
    L.innerHTML=Object.keys(CAT_LABEL).map(function(k){return '<div class="legrow" data-leg="cat:'+k+'"><span class="sw" style="background:#fff;border-color:'+CAT_COLOR[k]+';border-width:2px"></span>'+CAT_LABEL[k]+'</div>';}).join('');
  } else if(State.colorMode==='dtype'){ $('#legTitle').textContent='数据类型';
    L.innerHTML=Object.keys(DTYPE_COLOR).map(function(k){return '<div class="legrow"><span class="sw" style="background:#fff;border-color:'+DTYPE_COLOR[k]+';border-width:2px"></span>'+k+'</div>';}).join('');
  } else if(State.colorMode==='lat'){ $('#legTitle').textContent='延迟热度';
    L.innerHTML='<div class="legrow"><span class="sw" style="background:rgb(80,150,246)"></span>低延迟</div><div class="legrow"><span class="sw" style="background:rgb(255,90,36)"></span>高延迟 (max '+(State.maxLat||0)+')</div>';
  } else { $('#legTitle').textContent='图例';
    L.innerHTML=''
     +'<div class="legrow"><span class="sw" style="background:var(--op);border-color:var(--op-bd)"></span>算子节点 (TILE_*)</div>'
     +'<div class="legrow"><span class="sw" style="background:#fff;border-color:var(--card-bd)"></span>张量节点</div>'
     +'<div class="legrow"><span class="sw" style="background:#fff;border-top:3px solid var(--green)"></span>图输入/输出张量</div>';
  }
}

function renderDiffPanel(){
  if(!State.diff){return;}
  var s=State.diff.stats;
  $('#diffCard').style.display=''; $('#diffListCard').style.display='';
  function bar(label,val,color,total){ var pct=total?Math.round(val/total*100):0; return '<div class="barrow"><span class="lbl">'+label+'</span><span class="track"><span class="fill" style="width:'+pct+'%;background:'+color+'"></span></span><span class="num">'+val+'</span></div>'; }
  var tot=s.nodes.total||1;
  $('#diffStats').innerHTML=
    bar('新增节点',s.nodes.added,'var(--d-add)',tot)+
    bar('删除节点',s.nodes.removed,'var(--d-rem)',tot)+
    bar('修改节点',s.nodes.modified,'var(--d-mod)',tot)+
    bar('保持不变',s.nodes.same,'#cbd5e1',tot)+
    '<div class="edgesum">连边：<span style="color:#16a34a">+'+s.edges.added+'</span> &nbsp; <span style="color:#e11d48">−'+s.edges.removed+'</span> &nbsp; ='+s.edges.same+'</div>';

  var list=$('#diffList'); var items=[];
  State.scene.nodes.forEach(function(sc){ if(sc.state!=='same') items.push(sc); });
  items.sort(function(a,b){ var ord={removed:0,added:1,modified:2}; return ord[a.state]-ord[b.state]; });
  $('#chgCount').textContent=items.length+' 项';
  list.innerHTML=items.map(function(sc){
    var n=sc.node; var col=STATE_COLOR[sc.state]||'#94a3b8';
    var tyzh={added:'新增',removed:'删除',modified:'修改'}[sc.state];
    var nm=(n.kind==='op'?n.title:(n.symbol||'Tensor')+' ('+n.rawmagic+')');
    return '<div class="chgitem" data-id="'+n.id+'"><span class="sw" style="background:'+col+'"></span><span class="nm">'+esc(nm)+'</span><span class="ty">'+tyzh+'</span></div>';
  }).join('') || '<div class="empty">两图一致，无差异。</div>';
  Array.prototype.forEach.call(list.querySelectorAll('.chgitem'),function(it){ it.addEventListener('click',function(){ selectNode(it.getAttribute('data-id')); centerOn(it.getAttribute('data-id')); }); });
}
function centerOn(id){ var s=State.scene.byId[id]; if(!s)return; var p=nodePos(s,ease(State.t)); var ss=stageSize(); State.view.tx=ss.w/2 - p.x*State.view.k - 165; State.view.ty=ss.h/2 - p.y*State.view.k; applyView(); }

function applyFilters(){
  var q=State.query.toLowerCase(); State.matchSet={};
  if(q){ State.scene.nodes.forEach(function(s){ var n=s.node; var hay=(n.title+' '+(n.symbol||'')+' '+(n.opcode||'')+' '+(n.magic||'')+' '+(n.opmagic||'')+' '+(n.rawmagic||'')).toLowerCase(); if(hay.indexOf(q)>=0)State.matchSet[n.id]=1; }); }
  frame();
}

function loadGraphA(g){ State.graphs.A=g; if(State.mode==='single'){ buildSceneSingle(g);} else { if(State.graphs.B)buildSceneCompare(g,State.graphs.B); else buildSceneSingle(g);} renderOverview(); }
function loadGraphB(g){ State.graphs.B=g; if(State.graphs.A){ State.mode='compare'; syncModeUI(); buildSceneCompare(State.graphs.A,g);} renderOverview(); }
function readFile(file,cb){ var r=new FileReader(); r.onload=function(){ try{ var j=JSON.parse(r.result); cb(j,file.name);}catch(e){ toast('JSON 解析失败：'+e.message);} }; r.readAsText(file); }

function toast(msg){ var t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t.__h); t.__h=setTimeout(function(){t.classList.remove('show');},2600); }

function setMode(m){ if(m===State.mode)return; State.mode=m; stop(); setT(0,true); syncModeUI();
  if(m==='compare'){ if(State.graphs.A&&State.graphs.B)buildSceneCompare(State.graphs.A,State.graphs.B); else if(State.graphs.A){buildSceneSingle(State.graphs.A); toast('载入对比图 (After)，或点「生成示例 After」');} }
  else { if(State.graphs.A)buildSceneSingle(State.graphs.A); }
}
function syncModeUI(){
  Array.prototype.forEach.call($('#modeSeg').children,function(b){ b.classList.toggle('on', b.dataset.mode===State.mode); });
  var cmp=State.mode==='compare';
  $('#loadB').style.display=cmp?'':'none';
  $('#demoBtn').style.display=cmp?'':'none';
  $('#scrub').classList.toggle('show',cmp);
  $('#loadAlbl').textContent=cmp?'载入基准图 (Before)':'载入基准图';
  $('#diffCard').style.display=(cmp&&State.diff)?'':'none';
  $('#diffListCard').style.display=(cmp&&State.diff)?'':'none';
  if(!cmp){ State.diff=null; }
  renderLegend();
}

$('#modeSeg').addEventListener('click',function(e){var b=e.target.closest('button');if(b)setMode(b.dataset.mode);});
$('#loadA').onclick=function(){$('#fileA').click();};
$('#loadB').onclick=function(){$('#fileB').click();};
$('#fileA').onchange=function(e){var f=e.target.files[0];if(f)readFile(f,function(j,name){loadGraphA(E.parseGraph(j,name));toast('已载入基准图：'+name);});};
$('#fileB').onchange=function(e){var f=e.target.files[0];if(f)readFile(f,function(j,name){loadGraphB(E.parseGraph(j,name));toast('已载入对比图：'+name);});};
$('#demoBtn').onclick=function(){ if(!State.graphs.A){toast('请先载入基准图');return;} loadGraphB(E.parseGraph(window.synthAfter(State.graphs.A.rawJSON),'After (demo · RemoveRedundantReshape)')); toast('已生成示例 After，可拖动时间轴查看变化'); };
$('#fitBtn').onclick=fit;
$('#colorMode').onchange=function(e){ State.colorMode=e.target.value; render(); };
$('#search').oninput=function(e){ State.query=e.target.value.trim(); applyFilters(); };
$('#zoomIn').onclick=function(){var s=stageSize();zoomAt(s.w/2,s.h/2,1.2);};
$('#zoomOut').onclick=function(){var s=stageSize();zoomAt(s.w/2,s.h/2,1/1.2);};
$('#zoomReset').onclick=fit;
$('#playBtn').onclick=play;
$('#toStart').onclick=function(){stop();setT(0);};
$('#toEnd').onclick=function(){stop();setT(1);};
$('#range').oninput=function(e){stop();setT(e.target.value/1000);};
$('#loopChk').onchange=function(e){State.loop=e.target.checked;};

var dragging=false,lx=0,ly=0,moved=0;
svg.addEventListener('mousedown',function(e){dragging=true;moved=0;lx=e.clientX;ly=e.clientY;svg.classList.add('grabbing');});
window.addEventListener('mousemove',function(e){if(!dragging)return;var dx=e.clientX-lx,dy=e.clientY-ly;moved+=Math.abs(dx)+Math.abs(dy);State.view.tx+=dx;State.view.ty+=dy;lx=e.clientX;ly=e.clientY;applyView();});
window.addEventListener('mouseup',function(){dragging=false;svg.classList.remove('grabbing');});
svg.addEventListener('click',function(){ if(moved<4 && State.selected){ selectNode(State.selected); } });
svg.addEventListener('wheel',function(e){e.preventDefault();var r=svg.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});

window.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(State.mode==='compare'){
    if(e.code==='Space'){e.preventDefault();play();return;}
    if(e.key==='ArrowRight'){stop();setT(State.t+0.05);return;}
    if(e.key==='ArrowLeft'){stop();setT(State.t-0.05);return;}
  }
  if(e.key==='f'||e.key==='F'){fit();}
});

var dropEl=$('#drop');
window.addEventListener('dragover',function(e){e.preventDefault();dropEl.classList.add('show');$('#dropSub').textContent=(State.mode==='compare'&&State.graphs.A)?'将解析为对比图 (After)':'将解析为基准图';});
window.addEventListener('dragleave',function(e){if(e.relatedTarget===null||e.clientX<=0||e.clientY<=0)dropEl.classList.remove('show');});
window.addEventListener('drop',function(e){e.preventDefault();dropEl.classList.remove('show');var f=e.dataTransfer.files[0];if(!f)return;readFile(f,function(j,name){var g=E.parseGraph(j,name);if(State.mode==='compare'&&State.graphs.A){loadGraphB(g);toast('已载入对比图：'+name);}else{loadGraphA(g);toast('已载入：'+name);}});});

window.addEventListener('resize',function(){ if(State.scene)applyView(); });

State.hiSet={}; State.matchSet={};
function boot(){
  try{
    var sample=JSON.parse($('#sample-data').textContent);
    var g=E.parseGraph(sample,'Before · RemoveRedundantReshape');
    loadGraphA(g);
  }catch(err){ toast('示例图载入失败：'+err.message); console.error(err); }
}
boot();
window.__GS={State:State,E:E};
})();
</script>
</body>
</html>
